# ════════════════════════════════════════════════
# AIDI Panel — Nginx Virtual Host Config
# Port: 22223 (default)
# Auto-generated oleh installer.sh
# ════════════════════════════════════════════════

server {
    listen 22223 ssl http2;
    listen [::]:22223 ssl http2;

    server_name _;

    root /var/www/aidipanel;
    index login.php index.html;

    # ── SSL ──────────────────────────────────────
    ssl_certificate     /etc/ssl/aidipanel/cert.pem;
    ssl_certificate_key /etc/ssl/aidipanel/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:AIDI:10m;
    ssl_session_timeout 1d;
    ssl_stapling        off;

    # ── Security Headers ─────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           "DENY"             always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "no-referrer"      always;
    add_header Content-Security-Policy   "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;" always;

    # ── Rate Limiting ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=aidi_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=aidi_api:10m   rate=30r/m;

    # ── Login page ────────────────────────────────
    location = /login {
        limit_req zone=aidi_login burst=3 nodelay;
        try_files $uri /login.php;
    }

    # ── Panel frontend (HTML) ─────────────────────
    location = / {
        # Redirect ke login jika belum ada session
        # (cek session dilakukan oleh PHP, bukan Nginx)
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # ── API Backend ───────────────────────────────
    location /api {
        limit_req zone=aidi_api burst=10 nodelay;
        try_files $uri $uri/ /api/api.php$is_args$args;
    }

    location ~ ^/(login|api).*\.php$ {
        # Pastikan file ada
        try_files $fastcgi_script_name =404;

        fastcgi_pass   unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Security: batasi method
        limit_except POST GET { deny all; }

        # Timeout
        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
    }

    # ── Blokir file sensitif ──────────────────────
    location ~ /api/config\.php$ { deny all; return 404; }
    location ~ /api/logs/         { deny all; return 404; }
    location ~ /api/cache/        { deny all; return 404; }
    location ~ /aidipanel-sudoers { deny all; return 404; }
    location ~ /\.(env|git|sql|sh|bak|log)$ { deny all; return 404; }
    location ~ /install\.sh$      { deny all; return 404; }

    # ── Logging ───────────────────────────────────
    access_log /var/log/aidipanel/nginx-access.log combined;
    error_log  /var/log/aidipanel/nginx-error.log  warn;

    # ── Gzip ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/html;
    gzip_min_length 1024;
}

# Redirect HTTP ke HTTPS
server {
    listen 22223;
    listen [::]:22223;
    server_name _;
    return 301 https://$host$request_uri;
}
